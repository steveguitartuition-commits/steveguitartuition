<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Circle of 4ths and 5ths Timer</title>
<style>
body {
  font-family: Arial, sans-serif;
  background: #222;
  color: #fff;
  text-align: center;
  margin: 0;
  padding: 20px;
}
img.logo {
  width: 500px;          /* double size on desktop */
  max-width: 90%;        /* prevents overflow */
  height: auto;
  display: block;
  margin: 0 auto 20px auto;
}
@media (max-width: 768px) {
  img.logo {
    width: 350px;        /* medium screens */
  }
}
@media (max-width: 480px) {
  img.logo {
    width: 250px;        /* phones */
  }
}
h1 { margin-bottom: 20px; }
select, button {
  font-size: 16px;
  margin: 8px;
  padding: 5px 10px;
}
.note-display {
  font-size: 80px;
  font-weight: bold;
}
.countdown-display {
  font-size: 60px;
  color: #f00;
  margin: 0;
  min-width: 50px;
  text-align: right;
}
.section {
  margin-top: 40px;
  border-top: 2px solid #555;
  padding-top: 30px;
}
.button-group {
  display: inline-block;
  margin: 5px 0;
}
.note-container {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 20px;
  margin-top: 10px;
}
</style>
</head>
<body>

<img src="steveguitartuition.com.gif" alt="Logo" class="logo">
<h1>Circle of 4ths and 5ths Timer</h1>

<label for="bpmSelect">Select BPM:</label>
<select id="bpmSelect">
  <option value="50" selected>50 bpm</option>
  <option value="60">60 bpm</option>
  <option value="70">70 bpm</option>
  <option value="80">80 bpm</option>
  <option value="90">90 bpm</option>
  <option value="100">100 bpm</option>
  <option value="110">110 bpm</option>
  <option value="120">120 bpm</option>
  <option value="130">130 bpm</option>
  <option value="140">140 bpm</option>
  <option value="150">150 bpm</option>
  <option value="160">160 bpm</option>
</select>

<div class="section" id="circle4ths">
  <h2>Circle of 4ths</h2>
  <div class="note-container">
    <div class="countdown-display" id="countdown4ths"></div>
    <div class="note-display" id="note4ths">C</div>
  </div>
  <div class="button-group">
    <button onclick="startAuto('fourths')">Start 4ths</button>
    <button onclick="stopAuto('fourths')">Stop 4ths</button>
  </div>
  <div class="button-group">
    <button onclick="stepForward('fourths')">Step Forward</button>
    <button onclick="stepBackward('fourths')">Step Back</button>
  </div>
</div>

<div class="section" id="circle5ths">
  <h2>Circle of 5ths</h2>
  <div class="note-container">
    <div class="countdown-display" id="countdown5ths"></div>
    <div class="note-display" id="note5ths">C</div>
  </div>
  <div class="button-group">
    <button onclick="startAuto('fifths')">Start 5ths</button>
    <button onclick="stopAuto('fifths')">Stop 5ths</button>
  </div>
  <div class="button-group">
    <button onclick="stepForward('fifths')">Step Forward</button>
    <button onclick="stepBackward('fifths')">Step Back</button>
  </div>
</div>

<script>
const notes4ths = ["C","F","Bb","Eb","Ab","Db","Gb","Cb","E","A","D","G"];
const notes5ths = ["C","G","D","A","E","B","F#","C#","G#","D#","A#","F"];
const audioMap = {
  "C":"C.wav","C#":"Cs_Db.wav","Db":"Cs_Db.wav","D":"D.wav",
  "D#":"Ds_Eb.wav","Eb":"Ds_Eb.wav","E":"E.wav","F":"F.wav",
  "F#":"Fs_Gb.wav","Gb":"Fs_Gb.wav","G":"G.wav","G#":"Gs_Ab.wav",
  "Ab":"Gs_Ab.wav","A":"A.wav","A#":"As_Bb.wav","Bb":"As_Bb.wav",
  "B":"B_Cb.wav","Cb":"B_Cb.wav"
};

const audioElements = {};
for(let n in audioMap){
  const a=new Audio(audioMap[n]);
  a.load();
  audioElements[n]=a;
}
const clickSound = new Audio("button-3.wav");
clickSound.load();

const bpmWaitTimes = {
  50:4800,60:4100,70:3500,80:3200,90:2800,100:2600,
  110:2400,120:2200,130:2100,140:2000,150:1900,160:1800
};

let index4=0,index5=0;
let autoRunning4=false,autoRunning5=false;

function showNote(type){
  document.getElementById(type==='fourths'?'note4ths':'note5ths').textContent =
    type==='fourths'?notes4ths[index4]:notes5ths[index5];
}
function playNote(type){
  const note = type==='fourths'?notes4ths[index4]:notes5ths[index5];
  audioElements[note].currentTime=0;
  audioElements[note].play().catch(()=>{});
}
function stepForward(type){
  if(type==='fourths'){
    index4=(index4+1)%notes4ths.length;
    showNote('fourths'); playNote('fourths');
  } else {
    index5=(index5+1)%notes5ths.length;
    showNote('fifths'); playNote('fifths');
  }
}
function stepBackward(type){
  if(type==='fourths'){
    index4=(index4-1+notes4ths.length)%notes4ths.length;
    showNote('fourths'); playNote('fourths');
  } else {
    index5=(index5-1+notes5ths.length)%notes5ths.length;
    showNote('fifths'); playNote('fifths');
  }
}

function startAuto(type){
  const bpm = parseInt(document.getElementById('bpmSelect').value);
  if(type==='fourths'){
    autoRunning4 = true;
    index4 = 0; // reset to C
  } else {
    autoRunning5 = true;
    index5 = 0; // reset to C
  }
  startCountIn(type, 1);
}

function stopAuto(type){
  if(type==='fourths'){
    autoRunning4 = false;
    index4 = 0;
    document.getElementById('countdown4ths').textContent = '';
    document.getElementById('note4ths').textContent = 'C';
  } else {
    autoRunning5 = false;
    index5 = 0;
    document.getElementById('countdown5ths').textContent = '';
    document.getElementById('note5ths').textContent = 'C';
  }
}

function startCountIn(type, count){
  if((type==='fourths' && !autoRunning4) || (type==='fifths' && !autoRunning5)) return;

  const countdownDiv = type==='fourths'
    ? document.getElementById('countdown4ths')
    : document.getElementById('countdown5ths');

  const bpm = parseInt(document.getElementById('bpmSelect').value);
  const interval = bpmWaitTimes[bpm] / 4;

  countdownDiv.textContent = count;
  clickSound.currentTime = 0;
  clickSound.play().catch(()=>{});

  if(count < 4) {
    setTimeout(()=> startCountIn(type, count + 1), interval);
  } else {
    setTimeout(()=> startNoteSequence(type), interval);
  }
}

function startNoteSequence(type){
  if((type==='fourths' && !autoRunning4) || (type==='fifths' && !autoRunning5)) return;

  const countdownDiv = type==='fourths'
    ? document.getElementById('countdown4ths')
    : document.getElementById('countdown5ths');

  const bpm = parseInt(document.getElementById('bpmSelect').value);
  const interval = bpmWaitTimes[bpm] / 4;
  let count = 1;

  const incIndex = ()=>{
    if(type==='fourths')
      index4 = (index4 + 1) % notes4ths.length;
    else
      index5 = (index5 + 1) % notes5ths.length;
  };

  countdownDiv.textContent = '1';
  showNote(type);
  playNote(type);

  const seqTimer = setInterval(()=>{
    if((type==='fourths' && !autoRunning4) || (type==='fifths' && !autoRunning5)) {
      clearInterval(seqTimer);
      return;
    }
    count++;
    if(count > 4) {
      clearInterval(seqTimer);
      incIndex();
      startNoteSequence(type);
    } else {
      countdownDiv.textContent = count;
      if(count > 1) {
        clickSound.currentTime = 0;
        clickSound.play().catch(()=>{});
      }
    }
  }, interval);
}
</script>
</body>
</html>
